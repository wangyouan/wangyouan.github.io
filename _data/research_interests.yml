- I am an Assistant Professor of Finance at the Wang Yanan Institute for Studies in Economics (WISE) and the School of Economics, Xiamen University. I received my Ph.D. in Finance from the University of Hong Kong. My research interests are in empirical corporate finance, corporate social responsibility, green finance, and political economy, with an emerging interest in the application of artificial intelligence to finance research. My work has appeared in journals such as Management Science and Review of Finance.
